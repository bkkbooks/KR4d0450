body:
  text: 牧潛集卷二元釋圓至撰銘對翠軒銘番昜山人開所居東室為軒以臨大屋屋之外高松十餘離離見其尾青葱蒨鬱若几案盆缶之植榜曰對翠筠溪牧潛為之銘曰洛園萬葉青蒼蒼秋霜一夕為紅黄偉哉正色無炎凉青虬緣雲紺鬚長㣲從屋端露昻藏道人緑眼含秋光憑軒不言淡相望莫隨秦官立道傍空山歲晏無遺芳静中齋銘記曰人生而静天性也感於物而動性之欲也又曰喜怒哀樂未發謂之中發而中節謂之和余謂未發者静者也性也發者感而動者情也故感於其所不忍而惻隠生焉感於其所不為而羞惡生焉感於可欲可恚而忿忮淫辟生焉無不本於性無不感於情中者性之恒和者情之善性情之辨學之大端也世儒言中曰不偏夫性感而情興然後其發也有善惡偏正自孟軻氏以情言性世儒尊守之而棄仲尼子思之說謂其近於佛而不敢取余不可毋辨從余遊者表上人名其室静中乞銘銘曰孰迫焉而紛孰召焉而應曰此妄動非吾之正吾之所我不形而存是謂大本生生之元孰其無形其有無情惟寂不動乃以一貞昧罔聖言銘訊於明印空字銘不可取非伯仁之印不可繫非五龍之紐泯焉而銷不磷於無紛然而鑄不緇於有天地以為龜萬物以為􅘴兼以子虚之章疊以鳥有之綬縱衡佩之六國息鬭合浦字銘并序孟嘗為合浦而徙珠還天隠子曰珠不徙民詭辭以塞黷吏之求耳世之惑久矣不亡而戚其失本有而計為得者寧獨浦哉銘曰聖頑異軀人襡其珠惟騖以求其獲愈䟱如彼饕官民煩珠逋民恬逋集孰返孰徂予女淵淵赤水不淤常沕其珍以直浦誣義空字銘并序以㫖引迷而義立焉迷無蒂也義有實耶銘之曰佛垂曲誘祖立直指迷既幻生義亦詭示求洎㳿於薨腊夢拾金而旦矜所獲以盩聖之則維昧之惑碧潭字銘觀潭於潭其碧湜湜酌潭於器視碧無碧色生於深而潭不色土濬於内湛渟泓洋炳為德藝惟湛之光光由湛生湛非光相人驚曄曄我泊無象不留以止不潰以肆維寒山子實有實似秀溪字銘并序珵姪居天台秀溪自號秀溪上人乞銘銘曰潮之惡水之愚豈其實由所居吾宗之秀賁其軀施及於溪乃其餘常流其名與溪俱為彼不清潔前汚牧潛集卷二
