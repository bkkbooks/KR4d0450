body:
  text: 牧潛集卷七元釋圓至撰榜疏秀州天寧化修延夀堂并什器疏五藴無常閲死生之傳舍一枝可寄為老疾之菟裘寖歷歲時頗成文具蛙産榻前之竈突久不黔蠧巢帳裏之花室將生白坐疑刮席卧恐如弓既為他日同歸當及間時預備架頭巾牀下履教渠高枕現成身後事病中禪自有孤燈證據江南諸山請秀州天寧因明叟住公安疏續江左風流遺唱我安能製麟膠主襄陽耆舊齊盟君自可執牛耳小借上遊勝勢要看下載清風某人仙苑三千年花天池九萬里翼蘸乾龍鼻賦詩邀宕月湫雲吸盡鴛湖披腹露天光野色一夔獨奏衆楚皆瘖蟄户有雷霆看清涼亦避三舍洞門無鎖鑰笑雄峰自隔重關大果寺化接待米疏參玄人束肚尋師餽糧千里待逋客曳裾成市下筯萬錢苦慚厨傳蕭條難諱書詞干乞一鉢飯借他臂力從教漂母嗔嫌五合陳元在杖頭但要侏儒驚倒費捐圭撮報溢倉箱敏書記住九峰諸山疏末山尼遒場披衣得大床大座儘堪舞袖回旋著錦看某水某邱不負敝貂馳走君為宗盟叱馭我聞吉語彈冠某人得集雲不傳之傳笑鄮峰無説而説南匾頭幾曾識話用如倒嶽傾湫真點胸只為有禪窮至削迹伐木忽風轉滯帆得勢似丹成拔屋皆仙路口僧來費此老分疏不少山前麥熟賺諸方錯舉更多洗盡駑凡吹回蠱濫傑首座住松溪資聖諸山疏歐阜産名材出鄧林無非杞梓谷源有孫葉生謝家即是芝蘭榻邊鼾乃植此郎囊底智巳堪驚我某人秀潤玉娠石腹昻藏鵠立雞羣千篇湧句裏雲濤親蘸冷泉淬筆三尺耀眉間虹氣忽從盱水發硎循前賢歷試之階展參軍獨㺯之手送青來將緑繞任紛紛山水爭妍衝碧落截紅塵付衮衮松溪細説晉陶將軍廟化儺疏神旗綵仗揚士行千載之靈畫袴朱衣屏水帝二雛之迹添滿座勝幡喜色回阼階朝服青眸薄技如小巫大巫儘堪嚇鬼此兄無多助寡助皆可通神歲歲福基人人夀域元宵舞會化緣疏危棚挂月高然錦砌之花大鼓當風低颭鈞臺之栁舞盡胡笳十八拍只消童子六七人鮑老袖長巳是郎當好笑祿兒腹大更能旋轉如飛清盼四筵纒頭萬錦開先住東林諸山疏花木瓜長孫生子有王謝一種風流白芙蕖集鷺藏鷗用晉宋諸賢故事人境如承夙記山川頓換春􅐾某人讀隋碑親見永公唱蠻歌全似郎罷毛錐子敵連城玉價非兔園册裏學成皮栲栳作擲地金聲是黃鶴樓前悟得正獨步橫行海上忽乘流直至山陰唱樓煩三百首别傳草木被文章錦繡起西江十八灘怒漲風雲隨棒喝雷霆同我輔車助公掎角陳湖法華六根懴會榜形山有六處聚落億劫舊遊法海出一味醍醐萬象同嗜於此回求真懴灼然度越餘修涖盟駐涌地之浮圖現瑞粲懸空之菡蓞心兵奏凱摩尼王髻裏旌勳欲宅救焚觳􅑌君門外俟駕盡滌舊汚垢障别開更始福基象王行處師子吼時慶后土皇天之長久玉鑑光中金鼇背上峙泰山磐石之堅崇宏老住南康城兜率山門疏曳布袋繞市覓錢要顯西來祖意撗折牀解腰共飯亦須北道主人是必真俗諦齊修乃見法食輪皆轉某人徑氣一毫不挫生機六出愈竒要索犀牛兒笑南州克由薄相拈出聖箭子疑梅山微涉鄉情同列皆驚後生可畏正當使十丈塵斂避受匡峰排闥獻青何必恣三寸舌縱橫鼓彭蠡漫空翻白佇觀促駕滿慰坐馳常清觀建道藏疏觀乃玄帝祈雨道場白玉蟾作記泉石經黎母仙題品劫外洞天風霆受武當帝使令人間福地須衆口撒開寶藏與萬象同轉法輪邀季家一諾千金闢三郎四達八板看鳯篆龍章汗牛充棟富侔金匱之貯藏驚蛇神獸鬼轉斗移星權奪璿璣之回斡福海夀山齊運天關地軸交馳代侯學士干省府求山資疏侯學士諱佑賢自述云幼時以神童召見特旨俾就劉文貞公受皇極象數天文厯法稍貴顯矣俄再謫湖南及還至龍興其家半為豪右侵取有茅屋在維揚將歸老不仕貧甚無養欲持疏干省府諸公求歸伯田之資自言其意如此以授豫友人伯潁穎轉求於豫豫以未識為疑伯頴曰昔姚使君在京幾困嘗假力焉長源黠在髫年曾受上皇之顧管輅貧由骨相每招丞相之嗔幸纍魂未葬湘魚隨老傖復騎淮鶴無古押衙解事興來愁殺韓翃有富彥國買鄰老去謾希康節但令公喜即寫我憂披腹呈琅玕悔舊夢苦懸閶闔抱膝吟梁甫拚殘生盡付草廬以此洗心便為報德開先寺李主忌辰疏潛宫施佛餘澤未衰遺廟妥靈生氣猶在適及條風之布又逢諱日之臨沅有芷澧有蘭慨冥思之何極澗采蘋潦采藻臨常享之敢違伏願整駕玄津旋艫有海願王成佛豈惟乘白雲而遊帝鄉佑我後人庶幾覩明月而思故國主詞云故國不堪回首月明中南康天寧造佛殿榜匡山隨水西來圖畫擁金城百雉固陵騎雲北去遺弓藏寶地千年著法筵管領二竒為巖邑耕耘五福星霜換劫輪奐改容雖魯國靈光僅存奈世間無鐵門限可鑄使天竺先生猶在將雨中為木偶人所嗤拆却要德山令行重興較楊岐話墮喚十萬貫纒腰之俠將銅山金穴平地移來妥千百億化身之靈有寶網璇題從天降下衍辰極方來慶厯作星灣此去美談勇施毋疑冥償不爽崇長老住南康能仁疏三千年花實為瑞明時比眼底青黃逈别八百里濤瀾作君玩物與胸中雲夢合并兹遊清冠平生此行不推戒臘某人華嶽峰尖秋集巴歌聲外陽春謂南山火即是石頭舌上不妨險峻將徑山龍拈向鉢底機先坐致太平乘興而來相契即住據關驗假雞俠客門前坦路全無臨湖招跨犢潛郎屋角舊山元在一音雷雨三祝晨昏牧潛集卷七
