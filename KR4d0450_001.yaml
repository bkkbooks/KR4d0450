body:
  text: 牧潛集卷一元釋圓至撰詩重登牛頭峯霜葉黃蝶飛崖泉白蛇挂行行尋故迹往物已屢化高步萬石上獨立一木下悠然顧吾影殘日在林罅古來遺世士泯觀混真假所視既已齊乘險意亦暇智愚相與奪得失紛代謝吾欲營力耕穿巖樹茅舍澆園養素稀肉食豆羮止園蔬角智區畽間樂止在耰鋤火晶赫秋炎緑疇暵為墟百憂視匕筯豈為目無娛清池有佳泉分決救其枯揮杓沃髙畛聫筒注卑渠稍回焦塊潤已覺拳葉舒連畦曉色開芳露晞鮮腴濯濯青甲抽如沐春雨餘繁香蓊踈户未歎貧屋虛一飽便當已五鼎將何如送珣上人入浙清氣哽子口唾之成嘉言少作非全功固已見其端局首蔭桑梓羣行隨一簞揚帆指洪濤興欲飛羽翰潤月蟄氣泄季冬候猶暄既免氷雪阻自減風水難吳郡古王州冠劒遝且繁於兹罄所挾足以媒交歡萬舌如傳郵載子一譽奔雪窗鳴風片亂澑凍冰條直夜久忽無聲傍簷時淅瀝青薪焰方吐紅燈花欲滴閉閣有餘溫蒙衾兀重席送勤滅宗出家旅殊鄉同里為骨肉况乃情所厚而兹忽分躅清霜凋廣野露立凍羣木日暮行孑身溪谷映餐宿吾聞含德者凝視養玄矚疾進氣雖鋭久踐途乃熟歲晏能復來青燈共寒屋贈玉龍曾道士畫龍頭乖龍逃雨走急落西山陬縮入畫仙筆雷公不能搜畫仙有墨池尺水涵十洲浴龍作玄骨騎入塵寰遊我求寫龍真畫仙許我不形全恐飛去為君且畫頭次韻陪星子胡主簿遊報先寺木棲與淵蟠所性各有適顧余邱壑戀大藥不醫癖青山亦可人乍見如素識森然一窗下獻此萬丈碧簿領三秦英軒昻謝塵迹壯齡已疊組舊閥况列戟潔身粉黛側僧榻羣面壁國鼎筆可扛天機錦自織停驂偶相值顧問借顔色東風吹芳原衆卉競春日逺郊農餉起煙屋香芋栗牛鳴雨隴寒釋耒泥濺膝良時一遊豫能不念民疾二宫山水窟屨鉢恬食息含羞目嶄絶詎意陪履屐終期凌蒼巔一視空八極和李使君十五韻臨淮功洗日遺澤在雲㭁茅土開前烈圭簮在後丞氣凝瓊樹日神動玉壺冰赤羽䘖絃筈彤弨閉緄縢長鈎工返鵲誤點巧成蠅秀句今無敵公才世共稱撫疲憐肅肅馭朽戒兢兢九府泉初溢雙輪秩更增瀟灘魚夢熟淦水鰐波澄藻筆傳于蒍璊衣製毾㲪搴帷將問俗懷綬且尋僧任大官難稱人存道可𢎞千林無祝網尺水有懸罾尚急謡興讟崇寬律見繩小煩施利器遙佇鶴書徴送建昌黃綺秀才踰淮教授還山羞聽紫芝歌旅館千門講四科絳帳未懸知己少黑裘漸敝閲人多秋風白下沾巾别落日青淮照影過莫對飯盤嗔苜蓿桑榆雖緩易蹉跎義塜斜城闕千棺瘞此斜古堆新穴滿平畬春藂亂哭鰥寡鳥雨樹雜開啼笑花散骨已粘苔作肉癡魂猶認土為家何人薄暮焚錢去風捲殘灰滿柏丫送馮君玉歸修厚齋所刻經板古鋟刓殘蠧篆斜以刀為筆竄訛差傳家不絶書成種入木能香墨噴花夀比石經垂更永用侔竹簡費尤加百金何日投君贖眼底空空冀暫遮次韻答許府判見嘲詩癖之什君不見蓬萊仙人五雲深興來忽起塵寰心手拈造化作一劇世上瓦礫皆黃金又不見珠宫靈娥睡新起賽喫雲漿賭骰子驀然發笑成電光不料陰陽噓頰齒道人文章亦如斯落筆心手不相知豈如曲士拾蠧紙堯桀滿腹堆羣疑願君閉口毗耶室竺貝孔韋皆長物著鞭捷出靈運前莫鬭生天鬭成佛雪後荆林道中冷風寒栁閉千門栁外啼鴉聚晚羣殘日暉暉烘雪氣徘徊半嶺作晴雲小汊麻骨燈明竹壁疏更深人語在茅廬開篷緣岸去沽酒點火撥船來賣魚送才上人再往湖南近聞歸又出何事迫身忙春路晴猶滑山亭晚更長竹枯湘淚盡花發楚魂香舊日曾行處因君思不忘四月雨噴煙含霧細難開撲入松房半是塺永日靜眠看更好蕭蕭葉上似風來胡盧胡盧河畔洗氊裘日日花香滿水流嫁得夫郎愛官職去隨太子取交州女官墓壠頭死樹丫微活路口崩亭腳半斜玉骨年深無祭祀變成蝴蝶撲松花吳王廟吳王廟近水邊山壁上雕青鬼臂蠻白日爐中煙色變散成雲氣滿人間贈魁天紀拈筆詩成首首新喜來豪叫欲攀雲難醫最是狂吟病我恰才痊又到君送宗嶽歸青蓮布囊詩幾卷歸計亦凄涼不惜經時别應知聚日長石峯蒸玉氣井水浸蓮香曾許為鄰寺招余住竹房寒食月暗花明掩竹房莫寒脈脈透衣裳清明院落無燈火獨繞回廊禮夜香暑途樹下偶成火雲騰焰土生煙誰種清陰滿水邊借與間僧眠半日免教劫燒壞禪天送宗傑歸青門山歸路梅花樹樹春莫將好景付悲辛明年君到青門寺我亦來為寺裏人富塘漾漾復澄澄長涵十畝清亦供貧者樂獨以富為名水葉秋時死山苖旱歲生固應鍾異氣青樹鬱佳城佛龕匠者乞詩能刻旃檀作屋形親從師授魯般經不將名姓兼年月寫釘咸陽京兆廳福聖院寬陰閣山根小閣瞰澄波側見青林入薜蘿六月人間嫌白日即應此處得陰多啄木詞紫冠綵翅錦翻翻靜覺聲如客打門何處飛來庭木上啄成屐齒印泥痕寄志勝上人自説冬前至深寒信亦稀非知為事阻應怪與言違瘴月人南去花時鴈北飛危欄有斜日獨望更依依懷本暢上人畏寒一月閉窗紗愁髮春來半欲華松院晚晴蜂亂出故應山徑有殘花寄海書記著紙過寒如著錦近詩成集有人偷興來喫盡百杯酒直上大蒙山頂頭悼霞彥標只怪君來入夢頻那知君是九泉人十圍菜肚禪千首并作海頭山上塵元夕觀傀儡錦襠叢裏鬭腰支記得京城此夕時一曲太平錢舞罷六街人唱看燈詞逢陳道士行腳參禪陳道士新年相見沈塘灣手持一卷廬山記云在白蓮社裏還芳塘芳塘雨霽緑初肥折得青條串露歸一樹殘花喧鬭雀紅香滿徑撲人飛匡山病起雨餘白石氣如炊濃緑陰中霽影遲經月不行庵下路樹禽引子去多時寄恩以仁風栁青青條葉新别愁江畔又逢春交情似我如君少一度相逢勝故人見新竹懷兄姚江村愛酒嫌官姚縣令長年三徑滿荒苔曾因養笋添窗竹一月柴門閉不開土木渡阻風空林路盡見波瀾輕槳何時掠水還日暮亂雲如宿鳥隨風片片泊廬山淦居士見訪娑婆穢土蓮花國五濁羣生九品人並坐夜深皆不語一燈分映兩間身寄南峰表上人自别陳湖寺清朋絶勝遊林中無半夏江上見孤舟夜夢思山泣寒禪過雪修知君詩思苦天際下盟鷗退藥山能仁憩薦福觀化亭解衣樟木影中坐露榻藕花風上眠絶喜此身今屬我興來隨處得蕭然訪泰上人不遇因題其壁土牀竹壁倚禪蒲只有殘煙滿地爐童子出門迎客語山人昨日去麻姑暮至奉化縣郭西水寺尋猶逺昏黑街名看不真山縣閉門官禁夜月明處處斷行人逢故人共看咸淳上苑花錦箋綵句敵春華白頭相見鍾陵寺我亦如君未有家曉過西湖水光山色四無人清曉誰看第一春紅日漸高絃管動半湖煙霧是遊塵憩青蓮寺花磚凝潤午風涼日影鶯聲睡思長一陳打窗山雨過忽聞滿閣焙茶香初改黃衣宣詔庭前受牒還御黃新賜滿城看臣僧記得沙彌日齊著青衣上戒壇和徽禪衲韻冷屋多虛響微風過亦聞窗光疏透雨火氣濕生雲瞬目靈機度開顔錯節分古今能有幾似我更如君送宗倜送子江頭水亦悲更能隨我定何時垂楊但為秋來瘦不為秋來有别離牧潛集卷一
