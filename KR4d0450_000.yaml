body:
  text: 牧潛集别集類四元提要臣等謹案牧潛集七卷元釋圓至撰至字牧潛號天隱髙安人至元以來遍厯荆襄吳越禪理外頗能讀書又刻意為古文髙自位置筆力嶄然多可觀者前有崇禎己卯僧明河書姚廣孝序後一篇稱初得抄本于武林前有方回序後有洪喬祖跋又有姚廣孝序序為逃虛子集所不載後又得見刻本多詩數首因校付毛晉刻之此本即毛晉所刻僅有喬祖跋及明河此文無方姚二序殆偶失之明河又稱嘗讀虎邱舊志見圓至修隆禪師塔記嘆其文字之妙今此記不見集中則不知何以不補入也自六代以來僧能詩者多而能古文者少圓至獨以文見亦緇流中之卓然者都穆南濠詩話嘗稱美其寒食曉過西湖送才上人再往湖南淦居士見訪諸詩今觀送才上人一詩尚不免凡語餘三篇誠楚楚有清致蓋其詩亦有可觀而圓至别有所注周弼三體唐詩乃弇陋不可言亦可知吟詠之道與考證之學其分路揚鑣也久矣乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書姚序後豫讀虎丘舊志志中有修隆禪師塔記高安圓至筆也歎其文字之妙不知至為何人是必有文集恨不得其全而觀之又數年在臯亭固如法友得抄寫牧潛集一册于武陵書肆中持以相示展視則為至本集知至字牧潛號天隱如獲至寶讀之青球古瑝層出疊見光怪陸離直令人應接不暇千古絶唱自有鬼神呵護終不可磨滅也前有方虛谷序後有洪居士跋二老皆極口稱許而少師此序集無有也豫得之會稽祁侍御家仍知此集國初已經翻刻道開法友近又得殘破刻本亦無少師此文知是元板校對無不同者但多詩數首耳恨空囊蕭瑟不能梓公同好適海虞毛子晉社兄入山見訪合前所得舉畀之子晉負奇志交友滿天下天下之竒書祕典將澌滅而僅存者不惜重購刻之為古人通血脈與後世開心眼其學日富其刻日廣是帙之歸殆輕塵足嶽耳豫竊有一言少師云天隱之文雖未見其如長江大河浩汗無際駭膽栗魄之勢少師概以陳言衮衮左衝右突而不休為長江大河此人所能耳若夫天隱之為長江大河則不然務在格斬腐粕不留朕迹一用靜神直抵極際意之所至空濶無前是始為真駭膽栗魄人所望洋而不能措一詞者也况論文須論品夫品與文如人質影並呈不可遁以私天隱既得法仰山欽師則與天目高峰妙公為同門昆弟何筆墨間不少及之是猶莊子不談孟子此尤見天隱之品高出古今則師此書自應與天地不老也崇禎已邜夏日吳門華山後學明河書
