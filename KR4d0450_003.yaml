body:
  text: 牧潛集卷三元釋圓至撰碑記雙嶺禪寺碑西山南趾羣奔飲於江望水十五里張翼而立曰雙嶺雙嶺之趾石泉漱激土田沃衍高壁隔其前大峯擁其旁藏焉若塢屏焉若國有麓垂首飲塢中圖志云東晉時有異比邱開其上為寺立七石磴坐天神之稟法者西有臺曰雨華云謝康樂譯經感瑞其上有壇離峙曰羅漢環巒竦立境益幽樹物皆異狀更北一二里有臺曰禪儀則隠人煮石為膳屋其處真誥稱白石子者也西山僊聖古境雙嶺又最舊所傳藏皆異代故物有銅像三千七百軀軀高數尺陳貞明元年又獲阿育王所造像於梁安寺陏敬埓禪師又鑄瑞佛五軀錄經五千餘卷􅍥焉則雙嶺禪之始也境既最則居遊皆賢偉聞人若德若遇若方若化咸駿望鴻德遇尤悍勁難敵世稱禪將一時聞士若張丞相商英徐叅政俯向侍郎子諲蔣漕使之竒楊奉使傑程尚書師孟潘興嗣洪炎洪芻争屈貴諏決留迹故在葢雙嶺雖以山水勝觀致天下賢傑亦以客賢傑而勝益聞名與實更相致者也開慶元年兵亂屋燬舊藏無脫者又三十年而今竹隠居之竹隠有詞學廉温縝厚導下不見聲威以已先之手矗數百楹皆撙羨不丐室既大完則曰兹邱獲稱慕於今者以諸師掲訓流聲賢顯承學林穴之好聖棲神止像詭器竒傳守古久今皆埃衊蕪蝕僅記志傳列可徴而遊者或駐笠討竒倚驂眺勝求之頃刻畢之信宿至迹竟磨滅不可原詰則聚求於予予口煩舌敝而不列其十一客主交病如以辭掲其概於石俾蹔目立得則山之畜積豈不益聞傳且諸師亦將脫其薈蘙乃來謁辭予視竹隠為法昆弟慶其志之成而有遺餘以及是也不可以弗能為解辭曰西山言言為邑獻妍或踞其阻受之以宇作而不居以遺禪祖禪祖之室有人有天亦有卿公避席乞言禪祖之堂其覆以閣隋經晉佛龍鬼間錯既崇歘圮與時仆起誰能起之維竹隠師致其潔勤以嫓前徽掃礫夷榛其築特特大鏞在序崇閣以簴舂爨沐涫隨欲咸具鑿趾得渠與曩址符智脗神㑹匪今匪初孰不有居其有不理或襮于表必匱於裏維竹隠師具善齊美掲辭焯實詒鑑無止饒州梁山資福禪寺記佛儒老氏均以性為學為教於天下其導物之方權巧之徑不同至於成性以通乎至神則說之宗學之序一也然必至靈甚睿之材乃足受其極深難聞之旨孔子以為器之有是者寡故中質不及者存諸筆舌之外而罕言之於定書則首唐虞取世常行者為典而祕羲黄以嚴大道葢欲上智者察吾不言而默得之不欲以中下之疑者駭常人之耳目以增其蔽此孔氏之酌其教與二教所張卑高夷峻之勢異也然伏羲之書雖世不傳其先天數象猶畧見於宋而黄帝書間為衆說所引者其文亦時雜見於戰國諸子之間觀其論辨所明壹皆死生化變神明之妙性命之原入諸老經釋典猶一人之說比雅誥所述禮章樂數所陳者其精粗詳簡特異古今聖人以一道善世不相見而相同所謂行乎中國若合符節寧不信哉後之君子學止於傳所見之書不能於綱綸數度常迹之間得羣聖人之同者以繼仲尼上達之傳反守其耳目所知疑其智之所不及於一本之教析而三之相仇相勝以希先儒捍衛攘斥之名豈仲尼意哉距餘干南五十里有禪林曰資福圖記以為作於梁大同因號梁山宋嘉定二年邑豪士奪其田籍諸儒庠寺無以食而廢皇帝既定南服乃詔有司故僧田奪於勢者還之詔屢下而寺不能復至元二十年今主僧日東來自錢塘恱其道者於邱荒間復為寺留之請於官願如詔然猶以廢久籍版之載不完每租僦斂徴姦農相黨為扞拒官争室辨累歲而賦取輕重之疑不决於是東之友宗琦以便宜居間為平相田以酌其利之出損益檢覈莫不得情而當其實㗴嚚乃屈東始得以其入浸廣其搆築陶埴之功穹殿廣堂長廡邃寢相繼而備不數年而梁山復振與諸禪齒葢非東之道則衆不附而勢不能興東非琦之材則無以彊其孤怯而達其志相待而值相求而得兹興所以易也東以侍先師受㫖傳故求記於予嗚呼知衰盛之變不常則私其教者不可以彊而暴於人知以力取者卒失於後則以力復者當以難恃為懼余既推三聖人之志廢興往復之鑒諭世之私其教者又以享成之不易勵吾嗣世守業者焉日東樂平人得業於邑之正覺嗣今薦福月磵師元貞元年某月日髙安沙門圓至記南窗記怡上人居餘干鑑湖愛其勝類㑹稽取淵明所賦南窗寄傲者軒水之上榜曰南窗夫鑑湖山水之美昔賀公嘗棄朝市而樂之所以忘富貴而成其名然試考其領湖之勝者則不過一山陰茅宇耳無華軒采檻厚棟傑屋為境之飾也淵明雖忘世於一窗之安自比化國古民然所止窮陋特與耕翁牧子隣墻接舍於畦陌之間無竒山好水之觀以美其居而樂其隠然二子者皆捐禄仕易之僅得其一焉今子居高明以臨滉瀁不越户不徙席而兼有二子之美得不過於自適取於物者多歟雖然彼皆窮於外而假以逃者也非若吾專道忘世者安其性命之正誠於隠逸之樂則一水之勝一窗之好又足為吾黨之厚享哉市聲不喧湖光渺然開軒而望之庸知無賀監陶令蹐户求見嘆已之偏羨子之全也試以余言似之餘干縣臺山寺砌地記至元二十二年臺山寺主僧正中始勸其徒合錢以甓其室之地臺山遭靖康亂屋嘗廢更幾世傳百八十年然後能復完然自有寺以來址常築而弗甃景定初寺之人始甓其祠佛之殿主僧行斌又出私錢甓其堂塗外門將甓講法之堂役具而斌卒中其再世也因斌遺材而拓之又合衆助足其費訖二年而役遍盡寺内外即屋所及無履土而室者焉葢臺山在餘干南東當饒徽撫信四驛之交兵車使客之衢地其勢易以壊壊必數世然後能興而宫室之功恒急大後小則棟宇雖完而下弗飾雖妨於洒掃害於歩武猶百餘年不暇及亦力役先後之序使然此創業者常有不畢之功而願其後之賢也辛夘冬余復至廬山中在焉謂余曰役小也然其財非一人之施吾不敢畧小以廢衆善為我掇其概于石其佐吾之費者若佐吾祖之費者則枚書其施于石之陰余謂作室之患不難於成而難於備苟成矣雖有闕足怠以安故垂完之功或因循累世而不足若中汲汲以畢其先志亦才於嗣業者哉又能圖不朽以慰其類其嗜善敬事之心可述也乃不辭而畀之文平江府陳湖磧砂延聖院記姑胥以水為國民廬皆岸溝港濱泖涇而居畎畆之間有澮洫無涂徑雖東阡越西陌非舟不通荒村下聚菰葦魚鳥之鄉陂湖浸淫塗鹵㵕溢至於水之不及人乃以為桑為田猶必隄其外以備水之争環州四疆其東為海北西南為具區婁松之江貫其内土耕民與食於水者户相半猾商游販出疆入境之舟岸牽港刺夜歌晝行大抵一州之間民里往來以水為徑不獨資之以生而已然其險不測非如蹈土駕陸之安故逺涉者必恃中流有避患之地乃敢無恐而濟陳湖在長洲東四十里當華亭吳江之間兩界民舟之東西行者魚銜而蟻接然其水混江際海以雲為涯旦而放舟日昃而後至岸其浪波潮汐之壯足以敗舟帆而宿姦宄宋乾道八年寂堂禪師來自華亭得湖中費氏之洲曰磧砂乃庵其上為中流之鎮民利其留而惜其勢之猶小也更為大招提宫室居之於是穹殿涌堂屹流崛興據津瞰沚碇泊湊附既成因所請故額曰延聖院而定其傳為甲乙之居寂堂沒其子孫立浮圖以祀其舍利又刻三藏之經而棲其板於院北之坊其後磧砂四面沙益延而水日却東北皆為田屬於岸延聖子孫益蕃衍富盛其才賢者争以學術自緣飾時節衆㑹文物布述粲然矣寶祐六年延聖大火獨懴殿與寂堂之塔不火咸淳初住山可樞按火所毁募其徒分而搆之益為壯靡以加舊觀迨今吉公之世延聖院復成吉為六世之勤未能有記以留不朽使其老清懋買石以請於余葢自宋之季年郡國兵饑大姓貧而施予之家少名山大川化佛靈僧鼓鐘香火之宫福民夀國之祀其棟宇不幸而壊廢則無以勸豪傑之才力而復于成能自植立於邱燼之中以存其舊者少矣獨延聖益有餘力以增鉅麗為崇侈其勃興決起之勢非獨不撓於時之難而屋室之盛貲聚之贏方且擅强於今而加富於昔雖其嗣繼材智能争翔競奮以大其門亦寂堂養培積種以遺其後者豐堅根碩葉之蔭茂也嗚呼盛哉寂堂祝氏諱師元華亭人嘗學於水庵一公宻庵傑公有名孝宗時多靈德異迹既老又為白蓮寺於弁山之下而歸終於磧砂其言有錄而行有銘故不繁載於記延聖院觀音殿記余記延聖院逾月其大浮圖惟吉來曰院有刻經室有白衣菩薩之殿我所為也請復得記刻之役始至元二十四年六月成於二年七月成之明年然後舉殿所宜有畢備役於下者曰清宇曰志琛實庀其事相於旁者曰清仰清懋志明志頥實佽其費殿之中菩薩西嚮天王侍於前南北相嚮立凡二十軀其髹彤刻飾工材之價又若干則出於里豪顧氏葢湖濱之壯招提延聖為甲而延聖之屋百有餘室無能與殿比隆者則其勢之大作之難不見而可知也夫聖人之出必有地固將假境以表其教也教不一方得不一門觀音氏之道以耳為門以聞為脩以應為形故其神島處於海水之中水無窮而一月皆入應之智象焉海無聲而假潮以鳴聞之性顯焉使凡至其室者目撃而道得不言而教行此聖人導惑之㝠權也今夫陳湖之大姑蘇之水以是為歸霆奔雪躑澒洞百里半濟而後磧砂屹焉其境之所肖固有㝠示於人者而又當二邑之㑹舟車禳禬之衝險足以揚靈要足以拯物是故菩薩所擇處以行其教者也然則吉之成此其假物以諭於人者為道至大豈苟以崇材鉅甓之觀為一壑之飾哉初殿在院北廡南住山文雅所建也寶祐火禍毁焉吉於雅公為冡孫卒復殿以繼其先人之志友石軒記昔牛竒章李贊皇争以致石聲勢誇天下至卑躬而兄事之二子以私意為好惡其是非毁譽之際猶水火不相恱獨於石則所嗜無間然豈其緽確峭勁不渝之質足與好者為砥名勵節之鑒非以朝燠夕寒希價售者所可幾歟夫人之志有淫正雅俗每於所嗜見之二子之志葢近於正矣然竒章卒以黨比黜名行均穢與之暱者覆為詬而不足榮而贊皇之敗平泉所蓄其身猶不能有况其後世哉由此觀之二子於石雖欲忘所挾以友之而石未嘗與友也惟巖穴之士無慕求於世者止則與俱游則與適取諸左右而逢焉豈友之道必其同乃合不可以貴富彊取歟夫以卿相之勢非其同不與友此所以獲友者可貴石之可賢也吳郡瑞無象聚石所居之軒以友石名之無象行天下恱其意無幾雖師弟子之間猶患所趣之異獨厚於石若此豈亦有所合歟夫玩物以害其志之正二子之失也不於其同於其益君子之取友也余知子於斯友也鑒其堅則勝物之操益勵儀其峻則違俗之行愈高確以誠乎中重以儼其外則斯友於子也豈少益哉建昌州浄社院中興衆塔記吾之法死而葬其身者禮有三有葬諸天人龍鬼之宫者則其德之所成而願之所欲故其身已死猶能以堅凝不燼之體遺其後使為善者有所慕而興此至人大士神道垂教者所為也有葬諸鳥獸魚龞之腹者所以㓗有已之惑而成其仁此厲行之士遺身棄累者所為也有葬諸棺槨窀穸者其意葢曰是載我以適道者也於其壊而無以報吾則以觳此篤本之士中道而行者所為也是三者所以自待其身不同然所為皆有意焉故致其神則雖慘天地慟鬼神震幽震明而不為異捐其累則雖委幽壑露草野不藏不歛而不為恥隆其報則雖崇壤樹美棺槨廣堂厚域而不為泰然則禮之厚薄不齊者非有所愛惡於其身葢行之所成然也至元二十八年浄社院主僧正玉塔其寺北麓為衆之藏而覆之以堂廬之以庵祭之以庵田之粟凡所以答其身及其人者甚備既成求記於余葢浄社之先死者皆特葬窽鑿虧洩寺以耗瘁玉之師慶瑞始為同穴於今塔之左而所受不廣玉既遷而大之則禁來者毋别竁以戕地氣浄社自貞觀始闢已降稱中興者三曰靖康淳祐曰至元靖康淳祐之興皆延延僅繼不足以有中興之號獨玉承久敝之後能以儉勤起其衰其室之賢者若正超宗傳又戴而翼之凡淨社宫廬象物服玩用器至是大備而有贏則以貿腴田沃林植材木為繼而葺者無窮之需而猶有贏則儥脂燭以給衆之燈事然則玉之恢前迪後有中興號而不愧者非獨一塔之勤一世之賴也龍興府翠巖寺延夀堂記翠巖為西山禪藂巨室其棲衆之多廬屋之廣以備雖爨浣磑臼之舍無不完獨省行堂故缺長老訥公以為癃耄無養非建叢林意乃撙費成之而使余記其為堂之志以告於衆夫役於化而形生之本不立斯疾者老者所以資養於堂也鑒於人而思己之終雖壯者强者能不懼而勉耶然則公之成此也固養也有訓焉觀於堂者毋徒以有養為喜而以必入為懼及其身之安而思善其生於形化之外則公志得矣章江寺法堂記法者斯人之大範祖之所以教佛之所以成也故必有隆座廣堂以為其筵不若是則說者不尊聽者不嚴不尊不嚴則法卑而斯人之範替矣然尊而嚴之必自能法者章江故紙衣禪師化地禪師既以其法為教於此堂而又示從容為問答於將死之間以信其法葢師所以居此堂者其道如此然其室負城而宇使當無事則室常安一有攻守之虞則其居為矢石伐擊之地故寺廢徙於乙亥而復於丙子又二十年當余友静山之四年而後堂乃成嗚呼亦難矣夫吾之宫被天下然常患於難成而易壊者由繼而處者忘其先安坐而莫理也使後之來者知其祖之所以居静山之所以成則烏有不恐然恧然愧其所享之安而恬視其壊者哉然則余其可不記乃記而使刻之元貞元年六月日能仁圓至記平江府萬夀寺浴院柴莊記僧之躬以恬泊無慾為養其居也以鬼神為衛與鬼神混故形必㓗凝而不慾故血氣之閉必宣而後平為之浴以洩其襟鬲膚腠之煩雖大雪堅冰浴不廢焉所以節宣致潔也萬夀在鄽郭之間逺山少薪一湯之費用上農半月之食鼓鳴湢啟衣布而入如雲故凡主浴者必先掌田穡種刈事假利柄以集其費歲終則歛藁稭於所役之農歸而為薪以田為林以穫為樵故歲一不穰則薪之源竭涫濯之候愆期失宜暑雨之月病焉南州禪師蒞事之明年衆廣而浴政益脩永嘉祖朋寺徒也執其費三歲矣既而曰吾去里而東西漂手孑孑無挾以寺覆養涵植鷇長而羽飛之僧於兹食於兹抉吾橐一錢一粟必植根蕃葉於寺之帑不厚有報吾負不償乃悉舉其私及州民顧氏所施凡田四百畝歸其賦於公通一歲之浴為薪三萬及舟子竈人之僦他浴具席履匝匜茗藥之材壹以田入給之蓄其餘以備凶歲之不足焉然後費出有經而浴不匱祖朋勤於治貲積而不居凡衆之共億有大費必求其任久居之又寓錢於庫為子本以綿其施而害朋者撓仆之故屢立屢仆朋不懈嗜施益堅又施其餘田四十餘畝市膏燭以為法藏晝夜燈明之供二善立而懲昔不繼也余志其成就之難以勸于後其懐惠篤本雖老不渝亦徒之異乎其類者矣乃為書其欲而使刻之後有繼者視余言而矜朋之志浴傳不廢其庶幾哉處州連雲寺中興記縉雲公為福州二年遷月臺子得師主括蒼連雲禪寺且施田以益其人之食連雲人祠公以致其報明年兵亂寺為墟月臺傾已剏衆為庫為庾為廡為演說之堂堂之旁復為堂為寮以居四方之至者耆齒之倦而休者連雲坊屋壯廣搆築之勢不可以速成月臺久於勞思得材者繼其志乃請於官以連雲傳其嗣獨峰獨峰踵月臺之智毁囊以誘衆助寺殿以成職司之居蒙養之堂濡濯之室亦尋復其舊余居浙固久聞連雲之美而不能至於是獨峰弟仁傑遊太白為余言如此且欲余記而不能從又二十年縉雲公有子事大元為建昌刺史仁傑亦自括蒼至請刺史以未備者募民為之民懐刺史之煦含覆養而不報聞其募不戒而從刺史君又捐錢相之使歸訖功余時承乏能仁竊食息於刺史之土而傑猶欲其記余亦竒其偶㑹不復辭葢自僧民異官吾之諍者喜背惠自彊而施者之心始怠故其居一至於廢則無以興若月臺獨峰之賢卑卑以致其功刺史君之仁孝菲已以嚴其先人之祀是皆違俗特起以振其行挺然古賢傑之風豈惟兹寺之遭亦括蒼無窮愈偉之傳也寺始唐大中歴宋初為禪其境之美山水環踞之狀有葑洋石洞峻崗崇塢之勝見舊記詳矣余獨記其復興之概如此元貞元年五月日高安沙門圓至記瑞相院髮舍利塔記瑞相院徒居百人為斛容十石以盛其衆之棄髮歲久髮積至數斛主僧從益募錢為大㑹焚之得舍利五色無數益礱石一尋為塔三成以藏其所得謂余曰願有刻焉而陷置塔間夫聖人之行有六曰戒曰定曰精進曰慧曰施曰忍一有焉則舍利為之驗不必備也然窮其行之所致則神天地振幽顯猶不足極其効之大矧形軀散聚之間一骸一體之異於人也而吾聖賢混世者亦皆諱其異以同於衆雖一人之宫一日之聚猶有隠德晦行非常耳目可辨者而况百人之多數十年之久則或出㣲異以警觀聽之慢亦術化之常而益獨誇異顯崇之者豈無意哉今夫世之教者必曰敬其身雖髮膚不苟毁使無至德以神之是特臭腐之聚耳死不浹旬而靡骸潰胔雖子孫猶不欲視况能以是為愛敬天下後世哉然則益汲汲以顯其所致葢欲使惑者知吾之道雖不以矜詭行怪為神至其畜久而彰則雖㣲異小驗亦非他氏所能有也横川和尚塔記横川禪師示寂之六年其門人覺恩自甬東走潯陽造於高安圓至曰吾師之終也嘗自銘其藏矣然其言止於道不及其身故族里之出稟繼之系與絶德懿行之宜傳者未有載焉懼其久而亡也将求子記而顯刻之惟余於師葢見而知者不可辭乃記曰永嘉大姓林氏有處士崇夫娶宗正寺丞康公丕祖之女生三子長曰一登釋褐教授台州除太學正其季學沙門法諱如珙字子璞生嘉定壬午即師也處士以師孩孤狷潔不肉食難養於俗其季父有為禪沙門者名正則年十五從其祝髮預戒於州廣慈院以隨其志師猶伊鬱不懌既慰教以出學於外乃喜受教初從石田於靈隠及癡絶至猶留從之然終疑礙無入聞天目禮禪師太白衆盛往投以疑目察其可受為舉南山筀笋東海烏賊擬對打之師果有省自留執持以盡已道國清斷橋明眼謹肯可求藏主得師橋遷浄慈以為其第二座咸淳四年又為第一座浄慈言第一座有行解可師表宰相乃以師領鴈山靈巖禪寺說法嗣天目師疾宗唱之濫古響瘖鬱於可不可白黑無所諱為提拈贊示必崖聳標立務特起以映於古不少牽避於俗好惡其辯彊自勝若此然與人語囁吻促刺不敢出視之㢲愿人也其蓄衆慈以誠不為銜勒威控之術或面諍抗倔不遜旁聽皆憤師終無所罰更抆拭進使之不以忤已為衘人始嫌其不威久而懐之舉遷能仁時雪峰環溪入太白道過能仁聞語慕歎四年退止瑞光丙子亂郡牧彊以入師再入一歲乃歸放牧寮辭病閉卧不應外至元二十年忽有㫖授師育王廣利禪寺師愕眙謂非已疑拒累月乃受葢有奏於上者而不以告其遷能仁亦然自公選道廢位以求得惟師皆自至時論榮之師既引宗據祖屏遏今學年漸歲灸以取慕信當教法衰殘諸老師物故學者無所往皆聚於師故季年聲實喧震傾撼天下然師未嘗以望譽怙挾慢畧細故雖瓦埏木植羮葅辛鹹碎屑之間即衆所資仰必盡其慮力咸有迹可觀述凡六年乃退前退之歲為藏穴寺側曰此庵将没造曰吾旦日行矣歸坐書所以訣衆者而化年六十八至元二十六年三月十八日也門弟子禀遺誡以化三日窆全體於塔師朴外少飾中凝不雜能持坦坦不變於怒喜怨愛晚居能仁育王道益光師亦懼於無傳講誘孜孜未有厭位却衆嗜閑意然或迫而欲之則欣然避脫棄比毛秕不以退進順逆懐蠆芥學者挽執不置則棄所從而從之守扄擁户迄死乃釋嗚呼是區區者果師所待以晦顯耶余觀近世譔次名德行義率其徒私言誇增諱葢不可據信余昔自太白至育王時二師學弟子黨鬭有吻喙余單已自潔未嘗苟至師室才雋士以職使進引得名聲者纍纍見獨晦避無覬求師固無德於余余亦非德師者則其言豈惡愛減益倚筆舌為私報者哉宜可信於後師所為銘及訣衆語與所說法異有録不見于此建昌州福聖院方蛟峰祠堂記余居青門山聞旁近福聖院有水檻池閣之勝為先德稱詠則往游焉行四五里愒倦藉草卧覩壊甓斷礎突兀旁榛棘間荒址隠然從者曰是故豪民某之遺也死而貧貧而徙其尚留者此爾余矍然顧嘆為良久乃去既至老僧覺泰導余行殿旁觀所謂蛟峰先生祠者而邑老何君為配余怪問其故則曰咸淳初吾田為儒某氏以偽劵有其半福聖且壊辨於縣縣黨其賂於州州懾其豪連歲弗直㑹先生司臬事吾奔走愬焉先生使法吏摘其偽以産畀寺儒不服走京噭於臺且飛言刼先生先生不變卒據法為寺何君亦恚儒之不義潜槖賄給訟費當是時吾爨㡬凊㣲先生不食㣲何君之賜訟不終故吾每飯必祭然後敢食雖然吾老矣宜有以告後勿忘吾曰儒佛之鬭古無有其禍始於韓愈歐陽修之好名然二子競於外而事其末故諍止於教而不及道伊洛學出始竊吾意以飾堯舜孔子之言其建號立名又二子之智所不及既竊之則諱之絶之然其竊止於道不及其財近世乃有壊寺而墓攘田以食而吏不罰者葢宋季之昏俗亡政又衆子所不及矣夫尚孔子下楊墨孟子之志也使一旦蔑國禁奪楊墨之田以食孔子固孟子不為也而况吾窮神極性之道天子所上以教者然或者攫其食而吏勿禁得稱才吏哉然則先生捨黨以從義葢亦其責使然豈以詭節竒政市吾儔之私德哉先生姓方諱逢辰桐江人其文學廷策第一所試以能稱至元中召宋遺臣先生微服入富春山莫知所終何君死其子孫益大今為海昏甲豪而某氏者則余路所見者也蘄州黄梅縣慶圓庵碑黄梅縣東觀慶圓庵者異沙門朗公之遺也大業中公居此蔭茅以誦於華嚴㝠達諦本魅類獝族咸贄瑞物以謁訓敕空氣雲彩效神獻異江淮民凶慶禱之卒於東永福院而像食焉慶圓因入東永福為附庸南北争而淮為鬭地慶圓無以立興仆相躡於千數百年之間嘉泰初永福人宗明與其師茂嘗復為庵於故址俄棄之遊食於吳楚越間至元十三年江南平淮入𨽻陳留明亦自宿松返慶圓因其舊搆増屋而居買田以食始自别於永福異為口藉𣲖傳以為不可無告於後使求予於南康國家用佛理隆化治歲下書詔尚僧衛法然南土之僧居日敝豐堂奐宇飢嗸窘詈莫克恬享其先傳獨淮稟政中畿裒斂簡少吾之居者往往以其暇力易頽為新充貧以食非南裔可及者寧不以近而易達吏憚禁而澤不壅耶夫吾法有值以存於將季然下施隔之則上施屯而不達則夫居於近而幸為上之所及者得不感勵奮踊慶於難值汲汲而償其受哉余與明皆立於隆佛之代欲為明之為跼而莫可激而畀之辭曰去律聽八釋同脩别食食阿練若釋之静者彼以羣居我與吾俱獨而不懼遐遯化初久哉慶圓隨季之傳介今淮服為汴屬連以近受澤帝賚不偏慶圓之國或誦或默各以其道來食已力維祖之神以庵發聞居而不怍則室之人牧潛集卷三
