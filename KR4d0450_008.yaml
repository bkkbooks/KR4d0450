body:
  text: 天隱禪師文集序己亥之冬余往天目西峰忽覩天隱禪師文集一卷而虛谷方公敘其前且知天隱逺權要避名譽遍歷荆襄吳越積覽觀之富益靜定之光二三千言經目輒記故其為文贍而奧固嘗有觀人之道言為著之語兹集其緒餘耳世道不古玩習而好異昧本而趍新憫世之宗師嘗出沒儒釋而更為之化導儒而禪釋而文其揆一也抑嘗謂博古明道然後可以學文古而不道則蔽道而不古則野博與明亦相須焉道無言之文文有言之道先輩凋落後學日以懈每慨斯文之脈不絶如線不虞有是人也責沈之愧深矣於是夜坐申旦而讀之既至大壞於伊洛訓詁已錯愕歎詠又至佛儒老氏均以性為學為教於天下反覆論議則適然若得兀然若遺而不可自喻二百年無此作語非誇也非學古之道通乎文而明且博其何能見之確言之果沈著痛快使人如是乎使鐔川翁議此非數十百言意未暢而天隱數行耳文如是道可知也嗟乎其不延者天也其不延而延者亦天也虛谷見天隱之文於道余見天隱之道於文同耶異歟天者不可隱也大德三年天目雲松子洪喬祖序
