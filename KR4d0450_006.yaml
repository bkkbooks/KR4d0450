body:
  text: 牧潛集卷六元釋圓至撰雜著書朱元晦與蔡秀通手帖後右晦翁與蔡元定論考亭地形晦翁居考亭道益光故未年信地理尤甚其葬也執紼者六日而後至壙古之墓者授地於有司其兆域有常日月有時卜其安否則有之矣至於擇形穴之好以市利於死者則余未之聞也聖人仰觀俯察求利天下後世雖曰星辰之高農獵之賤無不推其利害之故以告人使地理之術果信則其以教不在佃漁種穫之後矣仁人君子福身而祚後宜有其道豈可覬諸土中之腐骨耶余又聞翁在南康嘗至歸宗寺謂金輪峰有王氣苟為山陵必益國祀嘗與趙忠定言之忠定不暇從而止嗚呼翁術忠矣然余謂古伊旦臯夔夀其國者其術疑不如是遂使世之去孝以求利者留其親之骨十餘年不入於土既窆復發三徙而猶不安其厝則余於翁不無恨焉書宣和史記後余居臨安有持大板史記而列傳老子為首心甚怪之莫知其本所出則問諸博書者亦莫知也因閲國朝會要見宣和某年有旨升老子於列傳首乃悟所見蓋宣和本今不行矣夫以一人之喜惡而欲誣萬世之傳載推是道以行政於天下其凶身禍國也宜哉書定惠院海書記壁東雲與余偕去鄉並途而遊迹半天下余留鄮山東雲自太白先余歸後三年乃相見受業定惠院與東雲歎契濶悼故舊為感愴悲慨余悵然為留纍日乃去而東雲猶眷眷止余謂余行之速也東雲之上曰成曰文余舊所識者今皆死其下二人則皆昔見時所未有也而余一去一來十年之間見東雲七世不知去此復見又幾年寺之人又幾世也古之人知會難恆而合之必睽故當歡而悲悼别以泣勢乖其所願而不能平不自知其感發之過也今東雲迫於傳次繼寺事長人之責加於身方盡力於所宜為余亦肆心所之將大去其土漂乎未知所窮出處之勢益懸則兹會不再審矣余懼異時難於復見而二人之思無窮也故留其常見者於壁既以慰東雲則余心亦自慰焉題悟栁山書唐子西硯銘及手帖後唐子西硯銘假物以喻其憤爾子西以雋才錮於廢謫其中蓋甚鋭而不忘動曰不能者特激辭爾憤而不怨君子之言也栁山禪師少時及見老先生為客以才句學辨知栁山者皆當世豪顯士使栁山志於進取其大獲久矣然且鬱於卑微猶不安其席退隱於侯溪之上以賦詠圖史忘其老豈亦養鋭以俟動耶斯銘蓋得其憤之同者也不然栁山之嗜博矣奚於子西獨諄諄費其筆哉栁山精書得骨於顔太師假資於寶晉此書尤秀韻可愛既自書其後復以手畢將之前輩慎重之風雖微事不苟如此書明侍者挽詩後月坡禪師董天童二年四方英士魁人他叢林不能致者皆敘席下番陽明東澗與余亦在焉余友雖衆在鄉人則惟海東雲琦楚石及明數子而已未幾明歸余止之明曰我願未得明年且復出不背言也然自是不見明蓋五歲余心怪明素不謾而忽違其言所蓄未伸而遽絶意於世也又明年余亦歸見其同室則出哀詩乞於余曰死久矣噫奚易耶世稱福夀人必賢明獨以夭殃慶之故昧而難測如是耶豈分之所受不可愚賢減益耶抑其稟之介多憤以賊其生耶然士不畏死而畏無聞明死哭者皆耆齒德明雖短奚憤哉又况同室之間狎而易怨獨能使之拳拳求述已於不朽則其自樹立之賢不待用於世接於人而後見也余雖不及見明而及出涕於哭者之後以一語飾潛德不愈於見哉書興上人送行偈後南昌興上人來集雲適匡徒者以公事夏於外集雲之衆羣學無所師余獨怪興之歸其色充然莫益之而挾愈富然則彼以一人之出處為道存亡者蓋惑爾古命一首推命以知祿先王之藝無有也其本於日者詭惑之遺技乎古之教盡已而罕言命吉凶之行修於人殃慶之政制於君事未然而欲逆知其故則探諸卜筮使民吉則從之咎則違之而非曰此之吉彼之咎一有命而不可易也日者起於何時其戰國無政之世乎今之為其徒者竒冠而詭服濶視而縱談推支干驗勝尅虛喝禍利危言以乘人之疑匿距以鈎情設岐以逃敗高諛泛佞預植其誣百失則諱而不言一中則挾而責賂使其學出於化明俗正之世不免於疑民害教之誅而今貴卿徹官以及井巷賤民咸信重其術無非之者亦有取焉爾蓋自漢以來士之賤時貴已者恆伏匿於是若季主屈賈宋管輅折何鄧譎而中道介然有君子之言其所以售於人非唯術技之良也三衢戴源海學陰陽星厯而不足資身也益學丹砂黃白水火之術術傳而道益困然終不肯一以所挾干貴人走通都間從吾徒異世離俗之士於荒山長谷間為寂寞遊得一言之譽則喜而藏之如獲餽贐將適錢塘登靈鷲而泛西湖出所藏詩若偈數百篇請余以言述之余謂審其藝者視其人夫不苟以技從利而恱異世離俗之言則其人不亦賢其志不幾乎古哉其於技宜良作古命授之以見雖豫之不好猶有取也九禽贊九禽之類有四視其形可識其名其二方飢一奔一追尾翼疆疆而不寧飽而水立者三兩小一大相顧而無營葉棲而並者四樂其所止以喙相賀若廣厦之崇成雖小大之智弗齊均於其生以適其形者哉惠曇畫贊後二首得食桑土間雄雌腹如鼓熟視風雨寒千田餉春午亭亭枝端立枝折將安之不如立苔石水清魚易窺題紫垣文後魁天紀聰明好古讀書能快覽捷領記憶兼人其作文出語新妍皆自得不盜襲蓋遵大途而駕者也性疏簡不能為機械意之所是以身徇之不顧譏憎以此怛忤於人而終不為備與余遊久豫愛其高明苦其忤而憂其簡也常告之曰君子之為學非苟以自娛而巳固將推其能以聞達於人也蘄達於人而不以智周乎外是猶能為車而不能御車雖良其行哉天紀善豫言終莫能用也因觀其文輒復書此告之天紀將逺遊方以其學馳騁於世其於名聲若蟄雷之欲奮幸留意瞽言以卒自致於達哉雪壑字説若知雪乎太陰之液觸寒而沍至潔所化凝黑為素不幹不蒂葉花自布漫空散下止不擇處觸途冒穢終莫能汙其或乘風夕起縈雲晝垂淩滯陰而瓌積御輕暄而絮飛冥區晃極萬象一色天黃地白迷曉以夕於斯時也而有陟太白之崆㟅凌蓬婆之屼嵲穿瑶林以散屐憩瓊樹以弭節履濕而塗不漸屨步燥而塵不坌襪骨凛玉府眸眩月窟斯亦遊萬物之至清御一氣之純潔也瑛禪者字雪壑雪言清壑言竒鑒物以朂德者也德之容不可言傳獨賦其雪壑之狀如此雖然迹其取物之方亦足覘其志之所期矣廷用字説印之用自朝廷逹郡國州邑然其權所令則各視其位貴賤土境之狹廣故或施於一官或行於一邑一州或被於一國其威之小大相去十百不啻豈才有所局則任有所限而號令之行亦各隨其所不能及而止歟惟朝廷之尊其印之權達天下雖窮夷荒蠻遐紀曠域車書所至符節所被罔不承風而靡然則勢足以盡印之用無封疆職守之限惟朝廷之貴邦之冡宰為然福唐印上人雋才而高志為歌偈清麗秀婉蓋將以其道推於世非止善其身者也余欲老其材為天下用不獨為一州一國之士故酌其名字之廷用又説之如此古玉字説延聖懋上人有文孫懋曰山積秀而育珍家積仁而才生種德不􅀢莠植善成災畬宜鍾美於汝以寶貴於世乃稱其才而命之曰琮則又問字於高安比邱圓至圓至曰夫至美不常得至寶不俗售故價於市者無良器狎於目者非貴質乃稱其名而字之曰古玉周有大筵奔公走侯他玉不陳獨登天球由其古傳貴莫與儔珩瑱笄珥艷體眩眸雖媚於今維玉之羞琮拜曰唯敬憲嘉猷愚隱字説吾觀古賢聖師以身持教者皆椎魯不學之夫而世之挈然智頴然藝者覆有所不及然則愚果適道之陛牖乎曰否斯固隱於愚爾道之頥非出類之智無以及少卑則眯然喟其卓矣况下斯乎聖人以上器不資於教而喻慮下質之憚於進而自沮也故示為其類以入於世固誘之使至爾匹夫孺子聞一言之要則不學而盡道之妙是可以類之似謂舉匹夫孺子槩足以得其得耶而世之真愚者不悟聖人之𡨕權以為道良我有傲然自慊欲舉其眯然者尊諸智者才者之上遊論一唱世翕然和之是以不學之俗日勝而教衰焉義哲字愚隱其鷙敢足以及道其名是矣其字則然者豈隱其不愚誘愚者之狎巳歟余眊不能辨信不獨懼其不幸而蹈世俗之惑也故因其求以告焉滅堂字説有宗上人字滅堂請説於余余告之曰窮於物者剝其廬息於外者安其居物之接於人也樅然擉然峥嶸膠葛於目視耳聽之間若風之激火之灸所以感心動性者日新而無窮然君子居之泊然無起於中猶稿橛朽株沃之雨露而不蘖滅之至也雖然滅因於生不生奚滅焉夫不達乎性之不生而以剛制強禁為滅是猶室之未仆而支以木謂之固而不知其慮之過也故聖人之法以作止任滅為學者誨者至患豈非智力之自勝不足通乎情性之自然耶今子遺名而一於道不以外之可恱移其守存乎中奭然而又力踐以至之於聖人之堂既得户而拾其級矣升而益高居而益安達乎自然而逺其患舍宗又誰望焉禹川字説琦石鏡謂余曰吾邑子濬名於師未字幸君有以命之余曰字者古以貴其名且隆成人也貴之隆之則欲其誠貴而誠隆故又遺之言勉其至於字所云者而序説之贈繼焉是皆朋類以義相砥切之為句絶致忠於其與責之善而必其成者也故言者信而後告取者擇而後求苟求失人苟告失言貴其身者弗為也濬於余莫之識也莫之識而求之莫之識而告之果禮哉雖然石鏡之欲也乃傳其名之義字之禹川夫以智治物君子不得巳也然因於彼以為功則行乎物之自然而以已不費故曰禹之治水水之道也不由其道而鑿險必行禹之所惡也夫君子之治其性也有異禹之於水哉行乎不得巳之間不幸而必以智濟亦因於物而巳故定其內而外從之豈役已以必乎彼哉濬以自治焉亦禹之道也險崖字説昔乖崖翁自述其志曰乖則違俗崖不利物乖崖之名聊以表德蓋以險絶為行務立於物之不能至也夫君子居易以同德於俗泯其大過人者卑卑與世爾汝彼不我即猶將援而進之豈固為穹巒峭崿危巖峻巘以拒彼之進也而萬物仰之常畏其卓然而難並然則君子所以險絶而異於物者亦彼之見然爾吾何有焉吳郡志昻字險崖余説其義如此昻慧而喜學才智穎然執已恂恂無不可犯之色然非得其頴然之同者終莫幸而近也曰崖也蓋肖云四詢字説堯曰咨四嶽舜曰詢于四嶽夫聖人資出類之智成已以成物欲有所為豈復假於人謀之贊然且汲汲如是是知取諸人以益已所未至雖堯舜猶然况衆人耶至於吾之道尤以擇師求友為學之方雖跋山川轢州邑老死不敢止者豈非所求者逺且大非一偏一曲之學可成歟然或者自限於鄉自足於一師敖然以聖賢所存盡於是嗚呼果盡耶古之人奚恱於勞而不自巳也余友榮師之子嶽從余遊且請字焉余懼所有不足饜嶽之求而觖其師之志也因其名字之四詢蓋欲以堯舜所以聖者誘嶽以廣其求毋以得於余者為多而自止也書近文與南峰表上人因題其後余少嗜古文每讀戰國秦漢作者之辭愛其高簡雄渾鋭意欲少似之由之不得其塗陷於聲律鄙淺之學蓋嘗慨然恥其失日夜刮濯求以自新然猶恨舊習既固自克之力未充每一引筆則時語衮衮不可禁嗚呼古之道其果不可至矣乎余客遊磧沙所遇無舊而表上人顧余獨厚嗜好亦與人同余無以為上人驤乃書近文數首為笑樂已丑臘日江西圓至書雜説贈與鍾山吾聖人自稱文佛蓋以存其道於無窮非文莫能曰經曰論皆是物也惟震旦諸師欲撫中下之質乃皆以天縱上智示為椎朴少文與愚者同事乃聖人冥權非真然也愚者誘於其迹直謂聖人道妙可以鄙俚凡近躐至薄經論為淺教斥文字為異端豈不惑哉吾宗為文而至者明教師一人而巳餘雖時有可采要皆駁而不純襞積剽割背馳於作者之徑雖止盜名一時而害正巳甚皆文之賊也鍾山有鐘霜至則鳴感於氣會於時則其聲出焉物之無情猶爾君子學以成其器不求聞於人也然當其得時用世則鏗天地震萬物雖欲瘖其道伏其響可得哉珏兄字鍾山從余學為文其於作者之塗余見其進而未止也以時之難感者之未會尚卑棲故林伏其聲而不震余欲出之於外而大其鳴也因其字而告以是言毋使黃間無射銷沉委翳於菰葦之間則余之願也祭圓通逸老代嗟乎好合之難信有冥契或並行而各詣孰不求而兩值方東湖之炎炎陶四海於罏錘挹光儀於始覿剨清明於醉寐既湓江之再逢仍聫序於末綴奪一搏其凌天震廣席而雷厲洗余喙其天池甘咀冰而咽薺公每借於鄰光許跰􅓷之及驥迄倦勤而脫梏復登余而使繼閉白日於一簷櫝虹芒而不試時載茗而就見沐霧雨於咳嚏豈形局之勞人委乾坤而寐蛻仆喬蔭於吾林紛猿咷而鶴泗愧余躅之殿公忽拍肩而並愒非仰及於先登良俯援其後至銘渥意之無窮酸余􅀈而集涕炳遺畫之可式誓凛凛其無墜慮喙舌之罕憑酹兹盂於厚地尚饗又衆寮祭代緊持密扶畢身拘拘一息之渝千形萬途况與疾攖風戰火爭力不勝形隨疾昏明公獨巋然視化猶卧病不廢偈死不忘坐俗衒口禪行疏語親不有生死熟明偽真如兹偉偉無怍師人我戴一囊身蹈千里來無異求所學惟死目見遺則既戚復喜強項徑膝為公跪稽尚饗祭一首座文才之所萃可以觀能有出於人雖下必升君之溫文器與德并廓其室庭不為垣城故集雲之閫猶天君獨階升為墨客侯溪之錫如林君以亞旅居先登信所處而必聞雖在晦而恆明而况恢襟豐頥俊謔豪笑百友一口有譽無詬豈貌卜之疑達亦德享之宜夀奚力其畬又糞其耨既蒔既秀不食其有主人憫才欲君之延奔走幣牲傾極齊凡懷盛賜而不報翩委蛻而遐騫寮采之故餞有常筵皎皎其歆不與化遷尚饗祭平懷翁道達志行不間窮卑以訓于家是亦其施踽踽懷翁獨傃其朴一邱食德環堵守約名蹊利閫影遁迹削天地萬物不易吾壑蒼顔黃頭毳褐休休夢盡浮漚隱几蛻遊我不識君識君之子秀文淑質豐貌胖體信由隱德陰授潛啓欲諱蹇辭懼沒遺美意或可歆芳潔盈几祭柏堂森禪師嗚呼法危如線在位束手萬鈞之荷公肩是受公在南方一世具瞻謂公其來脫縛解粘置之要津寧不挺出鬼憎人忌抑使長畢大弨不彀桑弧是挽在公奚憾衆憤扼腕愧我宗盟公論之源於公之存論噤莫呻呻於公死薦憤以文尚饗牧潛集卷六
